version: '3.8'

services:
  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      # Backend Store (PostgreSQL) - stores experiment metadata
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      
      # Artifact Store (S3-compatible - MinIO or Cloudflare R2)
      - MLFLOW_ARTIFACT_ROOT=s3://${MLFLOW_BUCKET_NAME}/mlflow-artifacts
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL}
      
      # Server Configuration
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
      - MLFLOW_SERVE_ARTIFACTS=true
      
      # Authentication (optional - for production)
      # - MLFLOW_AUTH_CONFIG_PATH=/mlflow/auth_config.ini
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME}/mlflow-artifacts
      --host 0.0.0.0
      --port 5000
      --serve-artifacts
    depends_on:
      - postgres
    networks:
      - churn-prediction-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      # Optional: Mount auth config for production
      # - ./mlflow_auth_config.ini:/mlflow/auth_config.ini:ro
      - mlflow-data:/mlflow

  # PostgreSQL Database (shared with backend)
  postgres:
    image: postgres:18-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - churn-prediction-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for local development)
  # For production, use Cloudflare R2 instead
  minio:
    image: minio/minio:latest
    container_name: minio-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - churn-prediction-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Client - Create bucket on startup
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
      /usr/bin/mc mb myminio/${MLFLOW_BUCKET_NAME} --ignore-existing;
      /usr/bin/mc anonymous set download myminio/${MLFLOW_BUCKET_NAME};
      exit 0;
      "
    networks:
      - churn-prediction-network

networks:
  churn-prediction-network:
    driver: bridge

volumes:
  mlflow-data:
  postgres-data:
  minio-data:
