<!DOCTYPE html>
<html>
<head>
    <title>CORS Test - Browser</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            background: #f4f4f4;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🧪 CORS Test - Browser</h1>
    <p>Test CORS configuration from browser to backend API</p>
    
    <button onclick="testHealth()">Test /health (No Auth)</button>
    <button onclick="testLogin()">Test /api/v1/auth/login</button>
    <button onclick="testDashboard()">Test /api/v1/dashboard/metrics (Auth Required)</button>
    <button onclick="clearCache()">Clear Results</button>
    
    <div id="result"></div>

    <script>
        const resultEl = document.getElementById('result');
        
        function log(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            resultEl.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
        }
        
        function clearCache() {
            resultEl.innerHTML = '';
        }
        
        async function testHealth() {
            log('Testing /health endpoint...');
            try {
                const response = await fetch('http://localhost:8000/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`✅ Status: ${response.status}`);
                log(`✅ CORS Headers:`);
                log(`   - Access-Control-Allow-Origin: ${response.headers.get('access-control-allow-origin')}`);
                log(`   - Access-Control-Allow-Credentials: ${response.headers.get('access-control-allow-credentials')}`);
                
                const data = await response.json();
                log(`✅ Response: ${JSON.stringify(data, null, 2)}`);
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
        
        async function testLogin() {
            log('Testing /api/v1/auth/login endpoint...');
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword'
                    })
                });
                
                log(`Status: ${response.status}`);
                log(`CORS Headers:`);
                log(`   - Access-Control-Allow-Origin: ${response.headers.get('access-control-allow-origin')}`);
                log(`   - Access-Control-Allow-Credentials: ${response.headers.get('access-control-allow-credentials')}`);
                
                const data = await response.json();
                log(`Response: ${JSON.stringify(data, null, 2)}`);
                
                if (response.status === 401) {
                    log('✅ CORS working! (401 is expected for invalid credentials)');
                } else if (response.status === 200) {
                    log('✅ Login successful!');
                }
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
        
        async function testDashboard() {
            log('Testing /api/v1/dashboard/metrics endpoint...');
            try {
                const response = await fetch('http://localhost:8000/api/v1/dashboard/metrics', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`Status: ${response.status}`);
                log(`CORS Headers:`);
                log(`   - Access-Control-Allow-Origin: ${response.headers.get('access-control-allow-origin')}`);
                log(`   - Access-Control-Allow-Credentials: ${response.headers.get('access-control-allow-credentials')}`);
                
                if (response.status === 401) {
                    log('✅ CORS working! (401 is expected without auth token)');
                } else {
                    const data = await response.json();
                    log(`Response: ${JSON.stringify(data, null, 2)}`);
                }
            } catch (error) {
                log(`❌ ERROR: ${error.message}`, true);
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
